<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgali — Solid Wood Furniture for Every Room</title>

    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/favicon-180.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- No static meta description: every route sets its own via <Seo> (react-helmet-async).
         A static one here DUPLICATES rather than gets replaced — JS-rendering crawlers then
         see two description tags and may pick the generic one. The static og:/twitter tags
         below stay as the fallback for non-JS social scrapers until SSR/prerender lands. -->
    <meta name="author" content="Forgali" />

    <meta property="og:title" content="Forgali — Solid Wood Furniture for Every Room" />
    <meta property="og:description" content="Solid wood furniture families trust — from bunk beds to dining tables. Free Canada-wide shipping." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://cdn.shopify.com/s/files/1/0972/6492/6995/files/forgali-logo-dark.png?v=1783621771" />
    <meta property="og:url" content="https://www.forgali.com/" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Forgali" />
    <meta name="twitter:title" content="Forgali — Solid Wood Furniture for Every Room" />
    <meta name="twitter:description" content="Solid wood furniture families trust — from bunk beds to dining tables. Free Canada-wide shipping." />
    <meta name="twitter:image" content="https://cdn.shopify.com/s/files/1/0972/6492/6995/files/forgali-logo-dark.png?v=1783621771" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
