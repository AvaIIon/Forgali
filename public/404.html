<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found | Forgali</title>
    <meta name="robots" content="noindex, follow" />

    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon-180.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Static, framework-free by design. Vercel serves this file with a real HTTP 404
         for any path that matches no route and no static asset. It must not depend on
         the SPA bundle: the whole point is that unknown URLs stop returning 200. -->
    <style>
      :root {
        --bg: #ffffff;
        --fg: #1a1a1a;
        --muted: #6b6b6b;
        --line: #e5e5e5;
        --accent: #1a1a1a;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121212;
          --fg: #f5f5f5;
          --muted: #a1a1a1;
          --line: #2c2c2c;
          --accent: #f5f5f5;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        background: var(--bg);
        color: var(--fg);
        font-family: Manrope, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      main { width: 100%; max-width: 34rem; text-align: center; }
      .logo { height: 2rem; width: auto; margin-bottom: 2.5rem; }
      @media (prefers-color-scheme: dark) { .logo-light { display: none; } }
      @media (prefers-color-scheme: light) { .logo-dark { display: none; } }
      .code {
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 0.75rem;
      }
      h1 {
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 700;
        line-height: 1.25;
        margin: 0 0 0.75rem;
      }
      p.lede { color: var(--muted); line-height: 1.6; margin: 0 0 2rem; }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
        margin-bottom: 2.5rem;
      }
      .links a {
        display: inline-block;
        padding: 0.55rem 1rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--fg);
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        transition: border-color 0.15s ease, background 0.15s ease;
      }
      .links a:hover { border-color: var(--accent); }
      .home {
        display: inline-block;
        padding: 0.75rem 1.75rem;
        background: var(--accent);
        color: var(--bg);
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9375rem;
      }
      footer { margin-top: 2.5rem; font-size: 0.8125rem; color: var(--muted); }
      footer a { color: var(--muted); }
    </style>
  </head>

  <body>
    <main>
      <img src="/forgali-logo-dark.svg" alt="Forgali" class="logo logo-dark" />
      <img src="/forgali-logo-light.svg" alt="Forgali" class="logo logo-light" />

      <p class="code">Error 404</p>
      <h1>We couldn&rsquo;t find that page</h1>
      <p class="lede">
        This page may have moved or no longer exists. Here&rsquo;s where to pick up
        the thread.
      </p>

      <nav class="links">
        <a href="/category/bunk-beds">Bunk Beds</a>
        <a href="/category/loft-beds">Loft Beds</a>
        <a href="/category/single-beds">Single Beds</a>
        <a href="/category/bedroom">Bedroom</a>
        <a href="/category/dining">Dining</a>
        <a href="/category/living">Living</a>
        <a href="/category/mattresses">Mattresses</a>
        <a href="/category/accessories">Accessories</a>
      </nav>

      <a class="home" href="/">Back to homepage</a>

      <footer>
        Looking for something specific?
        <a href="/contact">Get in touch</a> &mdash; we&rsquo;ll help you find it.
      </footer>
    </main>
  </body>
</html>
